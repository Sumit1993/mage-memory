<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="mage">
  <title>mage</title>
  <!-- graph-"m": nodes + edges trace an 'm'; three feet = three wings -->
  <g stroke="#54546f" stroke-width="3.4" stroke-linecap="round" fill="none">
    <line x1="28" y1="42" x2="28" y2="74"/>
    <line x1="28" y1="42" x2="39" y2="31"/>
    <line x1="39" y1="31" x2="50" y2="42"/>
    <line x1="50" y1="42" x2="50" y2="74"/>
    <line x1="50" y1="42" x2="61" y2="31"/>
    <line x1="61" y1="31" x2="72" y2="42"/>
    <line x1="72" y1="42" x2="72" y2="74"/>
  </g>
  <g fill="#cfd0e6">
    <circle cx="28" cy="42" r="4"/>
    <circle cx="50" cy="42" r="4"/>
    <circle cx="72" cy="42" r="4"/>
    <circle cx="39" cy="31" r="3.4"/>
    <circle cx="61" cy="31" r="3.4"/>
  </g>
  <circle cx="28" cy="74" r="6.5" fill="#a78bfa"/>
  <circle cx="50" cy="74" r="6.5" fill="#34d3c0"/>
  <circle cx="72" cy="74" r="6.5" fill="#fbbf24"/>
</svg>
