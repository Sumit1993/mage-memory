name: Feature request
description: Suggest an idea or improvement for mage.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or pain point, not just the solution.
      placeholder: When working across many notes I ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you would like mage to do. Sketches and example commands welcome.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you have tried or thought about.
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Fit
      description: mage captures durable insight, procedure, and pointers — never copies of sources, and it never runs git for you.
      options:
        - label: This fits mage's scope (a file-based, human-committed knowledge base).
          required: false
